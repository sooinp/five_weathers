<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#0b1a2e; }
  #map { width:100%; height:100%; }

  .ctx-menu {
    background: #1e293b;
    border: 1px solid rgba(99,130,180,0.35);
    border-radius: 10px;
    padding: 6px;
    min-width: 190px;
    font-family: 'Segoe UI', sans-serif;
    box-shadow: 0 4px 20px rgba(0,0,0,0.55);
  }
  .ctx-title {
    color: #94a3b8; font-size: 11px;
    padding: 4px 10px 6px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 4px;
  }
  .ctx-btn {
    display: block; width: 100%; padding: 8px 12px;
    background: transparent; border: none; cursor: pointer;
    color: #e2e8f0; font-size: 13px; text-align: left;
    border-radius: 6px;
  }
  .ctx-btn:hover { background: rgba(59,130,246,0.25); }

  .leaflet-popup-content-wrapper {
    background: transparent !important;
    box-shadow: none !important;
    border: none !important;
    padding: 0 !important;
  }
  .leaflet-popup-tip-container { display:none !important; }
  .leaflet-popup-content { margin:0 !important; }
</style>
</head>
<body>
<div id="map"></div>
<script>
(function() {
  var BOUNDS = [
    [54.2977, 18.2640],
    [54.5209, 18.6479]
  ];

  var map = L.map('map', {
    zoomControl: true, attributionControl: false, preferCanvas: true
  }).fitBounds(BOUNDS, {padding:[4,4]});

  // OSM 베이스 타일
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18, opacity: 0.6
  }).addTo(map);

  // 전술 오버레이 (백엔드 실행 중일 때만 보임 — 없어도 지도는 동작)
  function tryOverlay(url, opacity) {
    var img = new Image();
    img.onload = function() {
      L.imageOverlay(url, BOUNDS, {opacity: opacity, interactive: false}).addTo(map);
    };
    img.src = url;
  }
  tryOverlay('/api/map/tactical/terrain-image', 0.65);
  tryOverlay('/api/map/tactical/buffer-image',  0.45);
  tryOverlay('/api/map/tactical/cost-image?layer=risk&_t=' + Date.now(), 0.72);

  // ── 핀 아이콘 ────────────────────────────────────────
  function makePinIcon(fillColor) {
    var svg =
      '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">' +
      '<path d="M14 0C6.27 0 0 6.27 0 14 0 24.5 14 38 14 38S28 24.5 28 14C28 6.27 21.73 0 14 0Z"' +
      ' fill="' + fillColor + '" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>' +
      '<circle cx="14" cy="14" r="5.5" fill="white"/>' +
      '</svg>';
    return L.divIcon({
      html: svg, iconSize:[28,38], iconAnchor:[14,38],
      popupAnchor:[0,-40], className:''
    });
  }
  var BLUE = makePinIcon('#3b82f6');
  var RED  = makePinIcon('#ef4444');

  // ── 마커 관리 ─────────────────────────────────────
  var markers = {};
  function refreshMarkers(list) {
    Object.keys(markers).forEach(function(k){map.removeLayer(markers[k]);});
    markers = {};
    (list||[]).forEach(function(m) {
      if (m.lat==null||m.lng==null) return;
      var icon  = m.type==='departure' ? RED : BLUE;
      var label = m.type==='departure' ? '출발지' : (m.unit+'제대 도착지');
      markers[m.id] = L.marker([m.lat,m.lng],{icon:icon})
        .bindTooltip(label,{permanent:true,direction:'top',offset:[0,-40]})
        .addTo(map);
    });
  }

  // 300ms마다 마커 폴링
  var lastSeq = -1;
  (function pollMarkers(){
    fetch('/api/map/input/markers')
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.seq!==lastSeq){lastSeq=d.seq;refreshMarkers(d.markers);}
      }).catch(function(){});
    setTimeout(pollMarkers,300);
  })();

  // ── 우클릭 컨텍스트 메뉴 ───────────────────────────
  var ctxPopup = null;

  map.on('contextmenu', function(e) {
    var lat = e.latlng.lat.toFixed(6);
    var lng = e.latlng.lng.toFixed(6);
    var html =
      '<div class="ctx-menu">' +
      '<div class="ctx-title">위도 '+lat+' / 경도 '+lng+'</div>' +
      '<button class="ctx-btn" onclick="sel(1,'+lat+','+lng+')">📍 1제대 도착지로 설정</button>' +
      '<button class="ctx-btn" onclick="sel(2,'+lat+','+lng+')">📍 2제대 도착지로 설정</button>' +
      '<button class="ctx-btn" onclick="sel(3,'+lat+','+lng+')">📍 3제대 도착지로 설정</button>' +
      '</div>';
    if(ctxPopup) map.closePopup(ctxPopup);
    ctxPopup = L.popup({closeButton:false, maxWidth:220})
      .setLatLng(e.latlng).setContent(html).openOn(map);
  });

  window.sel = function(unit, lat, lng) {
    if(ctxPopup){map.closePopup(ctxPopup);ctxPopup=null;}
    fetch('/api/map/input/click', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({unit:unit, lat:parseFloat(lat), lng:parseFloat(lng)})
    }).catch(function(){});
  };

  map.on('click', function(){
    if(ctxPopup){map.closePopup(ctxPopup);ctxPopup=null;}
  });

})();
</script>
</body>
</html>
